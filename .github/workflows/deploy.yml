name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - ralph/v1-minimax-web-studio

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name grande-studio --branch ${{ github.ref_name }} --commit-dirty=true

      # Standalone Worker that hosts /api/inngest. Runs the long-running
      # MiniMax generation function — Pages Functions kill it at ~180s.
      - name: Deploy Inngest Worker
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.worker.toml

      # Sync the function manifest at the WORKER URL — not Pages. The Pages
      # /api/inngest +server.ts is kept for local dev but is not what Inngest
      # cloud talks to in production.
      - name: Sync Inngest manifest
        if: github.ref_name == 'main'
        run: |
          curl --fail -sS -X PUT https://grande-studio-inngest.tzpersonal.workers.dev/api/inngest
