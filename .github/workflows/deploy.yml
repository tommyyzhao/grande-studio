name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - ralph/v1-minimax-web-studio

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Both `main` and `ralph/v1-minimax-web-studio` deploy to production
      # (`--branch main`) because the working branch effectively *is* the
      # production source of truth right now — the long-running MiniMax
      # work has not been merged back to main. Without --branch main here,
      # ralph pushes only refresh the preview alias and prod stays stale,
      # which is what bit us during the SSE-on-Worker spike.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name grande-studio --branch main --commit-dirty=true

      # Standalone Worker that hosts /api/inngest and /api/events.
      # Pages Functions kill long-running requests; the Worker honors
      # [limits] cpu_ms = 300000 on the Workers Paid plan.
      - name: Deploy Inngest Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.worker.toml

      # Sync the function manifest at the WORKER URL — not Pages. The Pages
      # /api/inngest +server.ts is kept for local dev but is not what Inngest
      # cloud talks to in production.
      - name: Sync Inngest manifest
        run: |
          curl --fail -sS -X PUT https://grande-studio-inngest.tzpersonal.workers.dev/api/inngest
